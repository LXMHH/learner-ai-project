<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner.ai - 错题本</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* 仅补充样式，不改动原有布局 */
        .star-active { color: #f59e0b !important; }
        .tag-active { background-color: #dbeafe !important; color: #2b6cb0 !important; }
    </style>
<!-- 主题初始化：自动加载已设置的深色/浅色模式 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 读取本地存储的主题设置
        const savedTheme = localStorage.getItem('learner_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
    });
</script>
<script>
// 全局加载主题+字体（所有页面共用）
document.addEventListener('DOMContentLoaded',function(){
    const t=localStorage.getItem('learner_theme');
    if(t==='dark')document.body.classList.add('dark');
    const s=localStorage.getItem('learner_fontSize')||16;
    document.documentElement.style.setProperty('--base-font-size',s+'px');
});
</script>
</head>
<body>
    <!-- 侧边栏（完全不变） -->
    <div class="sidebar">
        <div class="logo">Learner.ai</div>
        <div class="menu">
            <a href="index.html" class="menu-item">
                <i class="fas fa-home"></i>
                <span>主页</span>
            </a>
            <a href="root.html" class="menu-item">
                <i class="fas fa-book"></i>
                <span>词根溯源</span>
            </a>
            <a href="wordlib.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span>词库</span>
            </a>
            <a href="wrongbook.html" class="menu-item active">
                <i class="fas fa-times-circle"></i>
                <span>错题本</span>
            </a>
            <a href="game.html" class="menu-item">
                <i class="fas fa-cube"></i>
                <span>单词游戏</span>
            </a>
            <a href="context.html" class="menu-item">
                <i class="fas fa-comment"></i>
                <span>情境学习</span>
            </a>
            <a href="settings.html" class="menu-item">
                <i class="fas fa-cog"></i>
                <span>设置</span>
            </a>
        </div>
    </div>

    <!-- 主内容区 -->
    <div class="main-content">
        <!-- 右上角登录/注册按钮 -->
        <div class="auth-buttons">
            <button class="btn btn-outline" id="loginBtn">登录</button>
            <button class="btn btn-primary" id="registerBtn">注册</button>
        </div>

        <!-- 错题本头部 -->
        <div style="margin-top: 80px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px;">
            <div style="display: flex; align-items: center; gap: 12px;">
                <i class="fas fa-times-circle" style="color: #ef4444; font-size: 24px;"></i>
                <h2 style="font-size: 28px; color: #111827;">我的错题本</h2>
            </div>
            <button class="btn btn-red" id="clearAllBtn">清空所有错题</button>
        </div>

        <!-- 统计卡片 -->
        <div style="display: flex; gap: 24px; margin-bottom: 32px;">
            <div class="stats-card" style="width: 150px;">
                <p style="font-size: 24px; font-weight: bold; color: #2b6cb0;" id="totalWrong">0</p>
                <p style="color: #6b7280; font-size: 14px;">总错题数</p>
            </div>
            <div class="stats-card" style="width: 150px;">
                <p style="font-size: 24px; font-weight: bold; color: #2b6cb0;" id="totalStar">0</p>
                <p style="color: #6b7280; font-size: 14px;">已收藏</p>
            </div>
            <div class="stats-card" style="width: 150px;">
                <p style="font-size: 24px; font-weight: bold; color: #2b6cb0;" id="todayStudy">0</p>
                <p style="color: #6b7280; font-size: 14px;">今日学习</p>
            </div>
        </div>

        <!-- 错题单词列表（动态渲染，原有样式1:1保留） -->
        <div id="wrongList" style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 24px;">
            <!-- 数据从本地存储自动加载，原有静态单词已删除 -->
        </div>
    </div>

    <!-- 登录/注册弹窗 -->
    <div class="modal" id="loginModal">
        <div class="modal-content">
            <h3>登录</h3>
            <div class="form-group">
                <label>用户名/邮箱</label>
                <input type="text" placeholder="请输入用户名或邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" placeholder="请输入密码">
            </div>
            <div class="form-actions">
                <button class="btn btn-outline close-modal">取消</button>
                <button class="btn btn-primary">登录</button>
            </div>
        </div>
    </div>

    <div class="modal" id="registerModal">
        <div class="modal-content">
            <h3>注册</h3>
            <div class="form-group">
                <label>用户名</label>
                <input type="text" placeholder="请输入用户名">
            </div>
            <div class="form-group">
                <label>邮箱</label>
                <input type="email" placeholder="请输入邮箱">
            </div>
            <div class="form-group">
                <label>密码</label>
                <input type="password" placeholder="请输入密码">
            </div>
            <div class="form-group">
                <label>确认密码</label>
                <input type="password" placeholder="请再次输入密码">
            </div>
            <div class="form-actions">
                <button class="btn btn-outline close-modal">取消</button>
                <button class="btn btn-primary">注册</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
    <script>
        // ===================== 核心修复：错题本 ↔ 学习页 数据互通 =====================
        // 1. 获取本地存储的收藏/错题单词
        function getWrongWords() {
            return JSON.parse(localStorage.getItem('wrongWords')) || [];
        }
        // 2. 保存到本地存储
        function saveWrongWords(arr) {
            localStorage.setItem('wrongWords', JSON.stringify(arr));
        }

        // 3. 动态渲染错题本列表（100%还原原有样式）
        function renderWrongList() {
            const list = getWrongWords();
            const wrongList = document.getElementById('wrongList');
            const totalWrong = document.getElementById('totalWrong');
            const totalStar = document.getElementById('totalStar');
            
            // 清空列表
            wrongList.innerHTML = '';
            // 统计数量
            totalWrong.textContent = list.length;
            const starCount = list.filter(item => item.type === 'star').length;
            totalStar.textContent = starCount;

            // 渲染每个单词
            list.forEach((item, index) => {
                const wordCard = document.createElement('div');
                wordCard.className = 'wrong-word-card';
                wordCard.innerHTML = `
                    <div style="display: flex; justify-content: space-between; align-items: flex-start;">
                        <div>
                            <h4 style="font-size: 28px; color: #111827; margin-bottom: 8px;">${item.word}</h4>
                            <p style="color: #6b7280; font-size: 16px; margin-bottom: 20px;">${item.meaning}</p>
                        </div>
                        <i class="${item.type === 'star' ? 'fas fa-star star-active' : 'far fa-star'}" style="color: #6b7280; cursor: pointer;" data-index="${index}"></i>
                    </div>
                    <div class="tag-group" style="display: flex; gap: 8px; margin-bottom: 24px;">
                        <span class="tag-active" style="padding: 6px 12px; background-color: #dbeafe; color: #2b6cb0; border-radius: 8px; font-size: 14px;">学习中</span>
                        <span style="padding: 6px 12px; background-color: #f3f4f6; color: #374151; border-radius: 8px; font-size: 14px;">已掌握</span>
                        <span style="padding: 6px 12px; background-color: #f3f4f6; color: #374151; border-radius: 8px; font-size: 14px;">高频错题</span>
                        <span style="padding: 6px 12px; background-color: #f3f4f6; color: #374151; border-radius: 8px; font-size: 14px;">难记词</span>
                    </div>
                    <div style="display: flex; gap: 12px; justify-content: flex-end;">
                        <button class="btn btn-green learn-btn" data-index="${index}">✓ 已学会</button>
                        <button class="btn btn-red delete-btn" data-index="${index}">🗑 删除</button>
                    </div>
                `;
                wrongList.appendChild(wordCard);
            });

            // 绑定事件
            bindEvents();
        }

        // 4. 绑定功能事件
        function bindEvents() {
            // 收藏/取消收藏
            document.querySelectorAll('.fa-star').forEach(star => {
                star.addEventListener('click', function() {
                    const index = this.dataset.index;
                    const list = getWrongWords();
                    list[index].type = list[index].type === 'star' ? 'wrong' : 'star';
                    saveWrongWords(list);
                    renderWrongList();
                });
            });

            // 删除单词
            document.querySelectorAll('.delete-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = this.dataset.index;
                    if(confirm('确定删除该单词吗？')) {
                        const list = getWrongWords();
                        list.splice(index, 1);
                        saveWrongWords(list);
                        renderWrongList();
                    }
                });
            });

            // 标记已学会
            document.querySelectorAll('.learn-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    const index = this.dataset.index;
                    if(confirm('恭喜！标记为已学会')) {
                        const list = getWrongWords();
                        list.splice(index, 1);
                        saveWrongWords(list);
                        document.getElementById('todayStudy').textContent = 
                            parseInt(document.getElementById('todayStudy').textContent) + 1;
                        renderWrongList();
                    }
                });
            });
        }

        // 5. 清空所有错题
        document.getElementById('clearAllBtn').addEventListener('click', function() {
            if(confirm('确定清空所有错题？')) {
                saveWrongWords([]);
                renderWrongList();
            }
        });

        // 初始化渲染（页面加载就显示学习页收藏/错题的单词）
        renderWrongList();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>单词PK</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- 主题初始化：自动加载已设置的深色/浅色模式 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 读取本地存储的主题设置
        const savedTheme = localStorage.getItem('learner_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
    });
</script>
<script>
// 全局加载主题+字体（所有页面共用）
document.addEventListener('DOMContentLoaded',function(){
    const t=localStorage.getItem('learner_theme');
    if(t==='dark')document.body.classList.add('dark');
    const s=localStorage.getItem('learner_fontSize')||16;
    document.documentElement.style.setProperty('--base-font-size',s+'px');
});
</script>
</head>
<body>
<div class="sidebar">
    <div class="logo">Learner.ai</div>
    <div class="menu">
        <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>主页</span></a>
        <a href="root.html" class="menu-item"><i class="fas fa-book"></i><span>词根溯源</span></a>
        <a href="wordlib.html" class="menu-item"><i class="fas fa-file-alt"></i><span>词库</span></a>
        <a href="wrongbook.html" class="menu-item"><i class="fas fa-times-circle"></i><span>错题本</span></a>
        <a href="game.html" class="menu-item active"><i class="fas fa-cube"></i><span>单词游戏</span></a>
        <a href="context.html" class="menu-item"><i class="fas fa-comment"></i><span>情境学习</span></a>
        <a href="settings.html" class="menu-item"><i class="fas fa-cog"></i><span>设置</span></a>
    </div>
</div>

<div class="main-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <h2>单词PK</h2>
        <button class="btn btn-outline" onclick="location.href='game.html'">返回大厅</button>
    </div>

    <!-- 原版PK界面 + 可答题 -->
    <div style="text-align:center; margin-top:40px;">
        <div style="display:flex; justify-content:space-around; margin-bottom:40px;">
            <div>
                <div style="width:70px; height:70px; background:#ebf4ff; border-radius:50%; margin:0 auto 10px; display:grid; place-items:center;">
                    <i class="fas fa-user" style="font-size:24px; color:#2b6cb0;"></i>
                </div>
                <p>我</p>
                <p id="myScore" style="font-weight:bold; color:#2b6cb0;">0分</p>
            </div>
            <h2 style="align-self:center;">VS</h2>
            <div>
                <div style="width:70px; height:70px; background:#fef2f2; border-radius:50%; margin:0 auto 10px; display:grid; place-items:center;">
                    <i class="fas fa-robot" style="font-size:24px; color:#ef4444;"></i>
                </div>
                <p>AI</p>
                <p id="aiScore" style="font-weight:bold; color:#ef4444;">10分</p>
            </div>
        </div>

        <h3 style="font-size:32px; margin-bottom:30px;">challenge</h3>
        <div style="display:grid; grid-template-columns:repeat(2,1fr); gap:20px; max-width:500px; margin:0 auto;">
            <div class="pk-option" data-ans="0">惩罚</div>
            <div class="pk-option" data-ans="0">休息</div>
            <div class="pk-option" data-ans="0">奖励</div>
            <div class="pk-option" data-ans="1">挑战</div>
        </div>
    </div>
</div>

<script>
// 单词PK - 修复：自动切换下一个单词 + 题库循环
const myScoreEle = document.getElementById('myScore');
const aiScoreEle = document.getElementById('aiScore');
const wordEle = document.querySelector('h3'); // 题目单词
const options = document.querySelectorAll('.pk-option'); // 四个选项

let myScore = 0;
let aiScore = 10;
// 题库：单词 + 正确答案索引 + 四个选项
const questionBank = [
    { word: "challenge", ans: 3, options: ["惩罚", "休息", "奖励", "挑战"] },
    { word: "develop", ans: 1, options: ["发现", "发展", "决定", "下降"] },
    { word: "experience", ans: 0, options: ["经历", "实验", "期待", "解释"] },
    { word: "significant", ans: 2, options: ["简单的", "相似的", "重要的", "特别的"] },
    { word: "cancel", ans: 1, options: ["隐藏", "取消", "覆盖", "考虑"] }
];
let currentIndex = 0; // 当前题目索引

// 渲染题目（核心函数：自动切换下一题）
function renderQuestion() {
    const q = questionBank[currentIndex];
    wordEle.innerText = q.word;
    // 刷新选项
    options.forEach((opt, i) => {
        opt.innerText = q.options[i];
        opt.dataset.ans = i === q.ans ? '1' : '0';
        opt.style.background = ''; // 清空颜色
    });
}

// 点击选项答题
options.forEach(opt => {
    opt.onclick = () => {
        // 判断答案
        if(opt.dataset.ans === '1'){
            myScore += 10;
            opt.style.background = '#d1fae5';
        }else{
            opt.style.background = '#fee2e2';
            aiScore += 5; // AI加分
        }
        // 更新分数
        myScoreEle.innerText = myScore + '分';
        aiScoreEle.innerText = aiScore + '分';

        // ✅ 核心修复：延迟0.5秒后自动切换下一题
        setTimeout(() => {
            currentIndex = (currentIndex + 1) % questionBank.length;
            renderQuestion();
        }, 500);
    };
});

// 初始化第一题
renderQuestion();</script>
</body>
</html>

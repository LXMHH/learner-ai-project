<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner.ai - 主题设置</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .theme-item {padding:16px;border-radius:12px;border:2px solid var(--card-border);cursor:pointer;text-align:center;transition:.2s;background:var(--card-bg);}
        .theme-item.active {border-color:#2b6cb0;background:#ebf4ff;color:#111827;}
        .theme-item:hover {transform:scale(1.02);}
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Learner.ai</div>
        <div class="menu">
            <a href="index.html" class="menu-item"><i class="fas fa-home"></i><span>主页</span></a>
            <a href="root.html" class="menu-item"><i class="fas fa-book"></i><span>词根溯源</span></a>
            <a href="wordlib.html" class="menu-item"><i class="fas fa-file-alt"></i><span>词库</span></a>
            <a href="wrongbook.html" class="menu-item"><i class="fas fa-times-circle"></i><span>错题本</span></a>
            <a href="game.html" class="menu-item"><i class="fas fa-cube"></i><span>单词游戏</span></a>
            <a href="context.html" class="menu-item"><i class="fas fa-comment"></i><span>情境学习</span></a>
            <a href="settings.html" class="menu-item active"><i class="fas fa-cog"></i><span>设置</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="auth-buttons">
            <button class="btn btn-outline" id="loginBtn">登录</button>
            <button class="btn btn-primary" id="registerBtn">注册</button>
        </div>

        <div style="margin-top:80px;">
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:32px;">
                <i class="fas fa-palette" style="font-size:28px;color:#2b6cb0"></i>
                <h2 style="font-size:28px;color:var(--text-color)">主题设置</h2>
            </div>
            
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:16px;margin-bottom:24px;">
                <div class="theme-item active" onclick="setTheme('light')">
                    <i class="fas fa-sun" style="font-size:24px;margin-bottom:8px;"></i><div>浅色模式</div>
                </div>
                <div class="theme-item" onclick="setTheme('dark')">
                    <i class="fas fa-moon" style="font-size:24px;margin-bottom:8px;"></i><div>深色模式</div>
                </div>
            </div>

            <div class="card">
                <div style="margin-bottom:12px;"><b>字体大小</b></div>
                <div style="display:flex;gap:12px;">
                    <button class="btn btn-outline" onclick="setFontSize(14)">小</button>
                    <button class="btn btn-primary" onclick="setFontSize(16)">中</button>
                    <button class="btn btn-outline" onclick="setFontSize(18)">大</button>
                </div>
            </div>

            <button class="btn btn-outline" onclick="window.location.href='settings.html'" style="margin-top:16px;">← 返回设置</button>
        </div>
    </div>

    <script>
        // 初始化加载主题+字体
        document.addEventListener('DOMContentLoaded',function(){
            const t=localStorage.getItem('learner_theme')||'light';
            setTheme(t);
            const s=localStorage.getItem('learner_fontSize')||16;
            setFontSize(s);
        });

        // 切换主题（真正生效）
        function setTheme(theme){
            document.body.classList.toggle('dark',theme==='dark');
            localStorage.setItem('learner_theme',theme);
            document.querySelectorAll('.theme-item').forEach(i=>i.classList.remove('active'));
            document.querySelectorAll('.theme-item')[theme==='light'?0:1].classList.add('active');
        }

        // 切换字体大小（核心修复：全网页生效+本地保存）
        function setFontSize(size){
            document.documentElement.style.setProperty('--base-font-size',size+'px');
            localStorage.setItem('learner_fontSize',size);
            const btns=document.querySelectorAll('.card .btn');
            btns.forEach(b=>b.classList.remove('btn-primary'));
            btns[['14','16','18'].indexOf(size)].classList.add('btn-primary');
        }
    </script>
    <script src="js/script.js"></script>
</body>
</html>

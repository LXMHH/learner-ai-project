<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner.ai - 通知设置</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .switch { width: 50px; height: 24px; background: #d1d5db; border-radius: 12px; position: relative; cursor: pointer; transition: 0.2s; }
        .switch.active { background: #2b6cb0; }
        .switch::after { content:''; width:20px; height:20px; background:#fff; border-radius:50%; position:absolute; top:2px; left:2px; transition:0.2s; }
        .switch.active::after { left:28px; }
    </style>
<!-- 主题初始化：自动加载已设置的深色/浅色模式 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 读取本地存储的主题设置
        const savedTheme = localStorage.getItem('learner_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
    });
</script>
<script>
// 全局加载主题+字体（所有页面共用）
document.addEventListener('DOMContentLoaded',function(){
    const t=localStorage.getItem('learner_theme');
    if(t==='dark')document.body.classList.add('dark');
    const s=localStorage.getItem('learner_fontSize')||16;
    document.documentElement.style.setProperty('--base-font-size',s+'px');
});
</script>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Learner.ai</div>
        <div class="menu">
            <a href="index.html" class="menu-item">
                <i class="fas fa-home"></i>
                <span>主页</span>
            </a>
            <a href="root.html" class="menu-item">
                <i class="fas fa-book"></i>
                <span>词根溯源</span>
            </a>
            <a href="wordlib.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span>词库</span>
            </a>
            <a href="wrongbook.html" class="menu-item">
                <i class="fas fa-times-circle"></i>
                <span>错题本</span>
            </a>
            <a href="game.html" class="menu-item">
                <i class="fas fa-cube"></i>
                <span>单词游戏</span>
            </a>
            <a href="context.html" class="menu-item">
                <i class="fas fa-comment"></i>
                <span>情境学习</span>
            </a>
            <a href="settings.html" class="menu-item active">
                <i class="fas fa-cog"></i>
                <span>设置</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="auth-buttons">
            <button class="btn btn-outline" id="loginBtn">登录</button>
            <button class="btn btn-primary" id="registerBtn">注册</button>
        </div>

        <div style="margin-top: 80px;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 32px;">
                <i class="fas fa-bell" style="font-size: 28px; color:#2b6cb0"></i>
                <h2 style="font-size: 28px; color: #111827;">通知设置</h2>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>学习提醒</span>
                    <div class="switch active" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>错题复习提醒</span>
                    <div class="switch active" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>活动通知</span>
                    <div class="switch" onclick="this.classList.toggle('active')"></div>
                </div>
                <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                    <span>新版本更新通知</span>
                    <div class="switch active" onclick="this.classList.toggle('active')"></div>
                </div>

                <button class="btn btn-outline" onclick="window.location.href='settings.html'" style="margin-top:16px;">← 返回设置</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>

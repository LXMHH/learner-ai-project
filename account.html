<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Learner.ai - 账户设置</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdn.bootcdn.net/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<!-- 主题初始化：自动加载已设置的深色/浅色模式 -->
<script>
    document.addEventListener('DOMContentLoaded', function() {
        // 读取本地存储的主题设置
        const savedTheme = localStorage.getItem('learner_theme');
        if (savedTheme === 'dark') {
            document.body.classList.add('dark');
        } else {
            document.body.classList.remove('dark');
        }
    });
</script>
<script>
// 全局加载主题+字体（所有页面共用）
document.addEventListener('DOMContentLoaded',function(){
    const t=localStorage.getItem('learner_theme');
    if(t==='dark')document.body.classList.add('dark');
    const s=localStorage.getItem('learner_fontSize')||16;
    document.documentElement.style.setProperty('--base-font-size',s+'px');
});
</script>
</head>
<body>
    <div class="sidebar">
        <div class="logo">Learner.ai</div>
        <div class="menu">
            <a href="index.html" class="menu-item">
                <i class="fas fa-home"></i>
                <span>主页</span>
            </a>
            <a href="root.html" class="menu-item">
                <i class="fas fa-book"></i>
                <span>词根溯源</span>
            </a>
            <a href="wordlib.html" class="menu-item">
                <i class="fas fa-file-alt"></i>
                <span>词库</span>
            </a>
            <a href="wrongbook.html" class="menu-item">
                <i class="fas fa-times-circle"></i>
                <span>错题本</span>
            </a>
            <a href="game.html" class="menu-item">
                <i class="fas fa-cube"></i>
                <span>单词游戏</span>
            </a>
            <a href="context.html" class="menu-item">
                <i class="fas fa-comment"></i>
                <span>情境学习</span>
            </a>
            <a href="settings.html" class="menu-item active">
                <i class="fas fa-cog"></i>
                <span>设置</span>
            </a>
        </div>
    </div>

    <div class="main-content">
        <div class="auth-buttons">
            <button class="btn btn-outline" id="loginBtn">登录</button>
            <button class="btn btn-primary" id="registerBtn">注册</button>
        </div>

        <div style="margin-top: 80px;">
            <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 32px;">
                <i class="fas fa-user-circle" style="font-size: 28px; color:#2b6cb0"></i>
                <h2 style="font-size: 28px; color: #111827;">账户设置</h2>
            </div>
            
            <div style="display: flex; flex-direction: column; gap: 16px;">
                <div class="card">
                    <div style="margin-bottom: 12px;"><b>修改用户名</b></div>
                    <input type="text" class="form-control" placeholder="请输入新用户名" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:12px;">
                    <button class="btn btn-primary">保存修改</button>
                </div>

                <div class="card">
                    <div style="margin-bottom: 12px;"><b>修改密码</b></div>
                    <input type="password" placeholder="当前密码" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px;">
                    <input type="password" placeholder="新密码" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:8px;">
                    <input type="password" placeholder="确认新密码" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:12px;">
                    <button class="btn btn-primary">更新密码</button>
                </div>

                <div class="card">
                    <div style="margin-bottom: 12px;"><b>绑定邮箱</b></div>
                    <input type="email" placeholder="请输入绑定邮箱" style="width:100%; padding:10px; border:1px solid #e5e7eb; border-radius:8px; margin-bottom:12px;">
                    <button class="btn btn-primary">发送验证</button>
                </div>

                <button class="btn btn-outline" onclick="window.location.href='settings.html'" style="margin-top:16px;">← 返回设置</button>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
